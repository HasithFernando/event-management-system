version: '3.8'

services:
  config-server:
    build: ./backend/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:///config-repo
      - EUREKA_CLIENT_ENABLED=false
    volumes:
      - ./config-repo:/config-repo:ro
    networks:
      - event-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  discovery:
    build: ./backend/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server
    environment:
      - EUREKA_INSTANCE_HOSTNAME=discovery
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    networks:
      - event-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=eventdb
    ports:
      - "5432:5432"
    networks:
      - event-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - discovery
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    networks:
      - event-network

  auth-service:
    build: ./backend/auth-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=auth_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - event-network

  event-service:
    build: ./backend/event-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=event_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - event-network

  ticket-service:
    build: ./backend/ticket-service
    ports:
      - "8084:8084"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=ticket_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - event-network

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8085:8085"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=notification_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - event-network

  analytics-service:
    build: ./backend/analytics-service
    ports:
      - "8086:8086"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=analytics_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - event-network

  payment-service:
    build: ./backend/payment-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
    networks:
      - event-network

  admin-service:
    build: ./backend/admin-service
    ports:
      - "8087:8087"
    depends_on:
      - discovery
      - event-service
      - auth-service
      - ticket-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
    networks:
      - event-network

  profile-service:
    build: ./backend/profile-service
    ports:
      - "8088:8088"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=profile_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    volumes:
      - profile-data:/data
    networks:
      - event-network

  review-service:
    build: ./backend/review-service
    ports:
      - "8089:8089"
    depends_on:
      - discovery
      - postgres
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb?currentSchema=review_schema
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    volumes:
      - review-data:/data
    networks:
      - event-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  profile-data:
  review-data:
  postgres-data:
