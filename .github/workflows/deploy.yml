name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY_NAME: eventmgmtacrsadeesha.azurecr.io
  RESOURCE_GROUP: event-management-rg
  CONTAINER_APP_ENV: event-app-env

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Check free disk space before build
        run: df -h

      - name: Clear unnecessary docker images
        run: docker system prune -af

      - name: Build with Docker Compose
        run: docker-compose -f docker-compose.yml build

      - name: Tag and Push Docker Images
        run: |
          services=(
            "api-gateway" "auth-service" "profile-service" 
            "event-service" "ticket-service" "notification-service" 
            "analytics-service" "review-service" "frontend"
          )
          for service in "${services[@]}"; do
            # Find the actual generated image name based on docker-compose directory structure
            # Depending on how compose builds them, it might be named event-management-system-<service> or similar.
            # Usually, you can tag based on the image name given in docker-compose.yml
            
            # Using the exact exact docker image name we define in docker-compose:
            IMAGE_NAME="event-management-system_${service}"
            if docker images | awk '{print $1}' | grep -q "^$service$"; then
               IMAGE_NAME=$service
            elif docker images | awk '{print $1}' | grep -q "^event-management-system-$service$"; then
               IMAGE_NAME="event-management-system-$service"
            elif docker images | awk '{print $1}' | grep -q "^event-management-system_$service$"; then
               IMAGE_NAME="event-management-system_$service"
            else
               # Default fallback assuming standard build syntax
               IMAGE_NAME=$service
            fi

            echo "Tagging and pushing $IMAGE_NAME as $service..."
            docker tag ${IMAGE_NAME}:latest ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            docker push ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            
            docker tag ${IMAGE_NAME}:latest ${{ env.REGISTRY_NAME }}/${service}:latest
            docker push ${{ env.REGISTRY_NAME }}/${service}:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          services=(
            "api-gateway" "auth-service" "profile-service" 
            "event-service" "ticket-service" "notification-service" 
            "analytics-service" "review-service" "frontend"
          )
          for service in "${services[@]}"; do
            echo "Updating Azure Container App: ${service}..."
            # Check if container app exists first
            if az containerapp show -n ${service} -g ${{ env.RESOURCE_GROUP }} &> /dev/null; then
              az containerapp update \
                --name ${service} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --image ${{ env.REGISTRY_NAME }}/${service}:${{ github.sha }}
            else
              echo "Container app ${service} not found. Please create it manually via az containerapp create first."
            fi
          done
